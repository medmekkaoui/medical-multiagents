<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orientation Clinique Multi-Agents</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #65717d;
        --line: #d9e1e8;
        --panel: #ffffff;
        --soft: #f4f7f9;
        --teal: #087f8c;
        --teal-dark: #066571;
        --rose: #b4233a;
        --amber: #a16207;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: var(--soft);
      }

      button,
      textarea {
        font: inherit;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 280px 1fr;
      }

      aside {
        background: #1f2933;
        color: white;
        padding: 28px 22px;
      }

      .brand {
        font-size: 20px;
        font-weight: 750;
        line-height: 1.15;
        margin-bottom: 26px;
      }

      .steps {
        display: grid;
        gap: 10px;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #cbd5df;
        padding: 10px 0;
      }

      .step.active {
        color: white;
        font-weight: 700;
      }

      .step svg {
        width: 18px;
        height: 18px;
      }

      main {
        padding: 32px;
      }

      .workspace {
        max-width: 1040px;
        margin: 0 auto;
        display: grid;
        gap: 18px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      .thread {
        color: var(--muted);
        font-size: 14px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 18px;
      }

      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }

      textarea {
        width: 100%;
        min-height: 150px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        color: var(--ink);
        background: white;
        line-height: 1.45;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        cursor: pointer;
        background: white;
        color: var(--ink);
      }

      button.primary {
        background: var(--teal);
        color: white;
      }

      button.primary:hover {
        background: var(--teal-dark);
      }

      button.secondary {
        border-color: var(--line);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      button svg {
        width: 17px;
        height: 17px;
      }

      .question {
        font-size: 20px;
        font-weight: 750;
        margin: 0 0 14px;
      }

      .summary {
        display: grid;
        gap: 12px;
      }

      .summary-item {
        border-left: 4px solid var(--teal);
        padding-left: 12px;
      }

      .summary-item.warn {
        border-left-color: var(--amber);
      }

      .summary-item strong {
        display: block;
        margin-bottom: 4px;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        line-height: 1.5;
      }

      .error {
        color: var(--rose);
        font-weight: 700;
      }

      .muted {
        color: var(--muted);
      }

      @media (max-width: 820px) {
        .shell {
          grid-template-columns: 1fr;
        }

        aside {
          padding: 18px;
        }

        .steps {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .step {
          font-size: 13px;
        }

        main {
          padding: 20px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const API_URL = "http://localhost:8000";

      function Icon({ name }) {
        return <i data-lucide={name}></i>;
      }

      function App() {
        const [caseText, setCaseText] = useState("");
        const [answer, setAnswer] = useState("");
        const [threadId, setThreadId] = useState("");
        const [step, setStep] = useState("case");
        const [question, setQuestion] = useState("");
        const [review, setReview] = useState(null);
        const [report, setReport] = useState("");
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [questionCount, setQuestionCount] = useState(0);

        useEffect(() => {
          lucide.createIcons();
        });

        const activeStep = useMemo(() => {
          if (step === "case") return 0;
          if (step === "question") return 1;
          if (step === "review") return 2;
          return 3;
        }, [step]);

        async function request(path, options) {
          const response = await fetch(`${API_URL}${path}`, {
            headers: { "Content-Type": "application/json" },
            ...options,
          });
          const payload = await response.json();
          if (!response.ok) throw new Error(payload.detail || "Erreur API");
          return payload;
        }

        function consume(payload) {
          setThreadId(payload.thread_id);
          setQuestionCount(payload.question_count || 0);

          if (payload.type === "patient_question") {
            setQuestion(payload.question);
            setStep("question");
            setAnswer("");
            return;
          }

          if (payload.type === "physician_review") {
            setReview(payload.physician_review);
            setStep("review");
            setAnswer("");
            return;
          }

          setReport(payload.final_report || "");
          setStep("report");
        }

        async function startConsultation() {
          setLoading(true);
          setError("");
          try {
            const payload = await request("/consultation/start", {
              method: "POST",
              body: JSON.stringify({ patient_case: caseText }),
            });
            consume(payload);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }

        async function resumeConsultation() {
          setLoading(true);
          setError("");
          try {
            const payload = await request("/consultation/resume", {
              method: "POST",
              body: JSON.stringify({ thread_id: threadId, answer }),
            });
            consume(payload);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }

        function reset() {
          setCaseText("");
          setAnswer("");
          setThreadId("");
          setStep("case");
          setQuestion("");
          setReview(null);
          setReport("");
          setError("");
          setQuestionCount(0);
        }

        return (
          <div className="shell">
            <aside>
              <div className="brand">Orientation Clinique Multi-Agents</div>
              <div className="steps">
                {[
                  ["clipboard-pen-line", "Cas patient"],
                  ["messages-square", "Questions"],
                  ["stethoscope", "Revue"],
                  ["file-text", "Rapport"],
                ].map(([icon, label], index) => (
                  <div className={`step ${activeStep === index ? "active" : ""}`} key={label}>
                    <Icon name={icon} />
                    <span>{label}</span>
                  </div>
                ))}
              </div>
            </aside>

            <main>
              <div className="workspace">
                <div className="topbar">
                  <div>
                    <h1>Workflow medical supervise</h1>
                    <div className="thread">{threadId ? `Session ${threadId}` : "Nouvelle consultation"}</div>
                  </div>
                  <button className="secondary" onClick={reset} title="Reinitialiser">
                    <Icon name="rotate-ccw" />
                    Reinitialiser
                  </button>
                </div>

                {error && <div className="panel error">{error}</div>}

                {step === "case" && (
                  <section className="panel">
                    <label>Cas initial patient</label>
                    <textarea
                      value={caseText}
                      onChange={(event) => setCaseText(event.target.value)}
                      placeholder="Exemple : Patient de 32 ans avec toux, fatigue et fievre depuis 3 jours."
                    />
                    <div className="actions">
                      <button className="primary" disabled={loading || !caseText.trim()} onClick={startConsultation}>
                        <Icon name="play" />
                        Demarrer
                      </button>
                    </div>
                  </section>
                )}

                {step === "question" && (
                  <section className="grid">
                    <div className="panel">
                      <p className="question">{question}</p>
                      <textarea
                        value={answer}
                        onChange={(event) => setAnswer(event.target.value)}
                        placeholder="Reponse du patient"
                      />
                      <div className="actions">
                        <button className="primary" disabled={loading || !answer.trim()} onClick={resumeConsultation}>
                          <Icon name="send" />
                          Envoyer
                        </button>
                      </div>
                    </div>
                    <div className="panel summary">
                      <div className="summary-item">
                        <strong>Questions traitees</strong>
                        <span>{questionCount} / 5</span>
                      </div>
                      <div className="summary-item warn">
                        <strong>Statut</strong>
                        <span>Collecte patient en cours</span>
                      </div>
                    </div>
                  </section>
                )}

                {step === "review" && review && (
                  <section className="grid">
                    <div className="panel">
                      <label>Conduite a tenir du medecin</label>
                      <textarea
                        value={answer}
                        onChange={(event) => setAnswer(event.target.value)}
                        placeholder="Traitement, surveillance ou orientation proposee"
                      />
                      <div className="actions">
                        <button className="primary" disabled={loading || !answer.trim()} onClick={resumeConsultation}>
                          <Icon name="check" />
                          Valider
                        </button>
                      </div>
                    </div>
                    <div className="panel summary">
                      <div className="summary-item">
                        <strong>Synthese clinique</strong>
                        <span>{review.diagnostic_summary}</span>
                      </div>
                      <div className="summary-item warn">
                        <strong>Recommandation intermediaire</strong>
                        <span>{review.interim_care}</span>
                      </div>
                    </div>
                  </section>
                )}

                {step === "report" && (
                  <section className="panel">
                    <pre>{report}</pre>
                    <div className="actions">
                      <a href={`${API_URL}/consultation/${threadId}/report/pdf`} target="_blank" rel="noreferrer">
                        <button className="secondary">
                          <Icon name="file-down" />
                          PDF
                        </button>
                      </a>
                    </div>
                    <p className="muted">Ce systeme ne remplace pas une consultation medicale.</p>
                  </section>
                )}
              </div>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
